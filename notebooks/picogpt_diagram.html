<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PicoGPT tensor flow</title>
<style>
  :root {
    --bg:       #ffffff;
    --fg:       #1a1a1a;
    --fg2:      #555555;
    --border:   #cccccc;
    --dash:     #aaaaaa;

    --teal-fill:   #E1F5EE;
    --teal-stroke: #0F6E56;
    --teal-title:  #085041;
    --teal-sub:    #0F6E56;

    --purple-fill:   #EEEDFE;
    --purple-stroke: #534AB7;
    --purple-title:  #3C3489;
    --purple-sub:    #534AB7;

    --blue-fill:   #E6F1FB;
    --blue-stroke: #185FA5;
    --blue-title:  #0C447C;
    --blue-sub:    #185FA5;

    --coral-fill:   #FAECE7;
    --coral-stroke: #993C1D;
    --coral-title:  #712B13;
    --coral-sub:    #993C1D;

    --amber-fill:   #FAEEDA;
    --amber-stroke: #854F0B;
    --amber-title:  #633806;
    --amber-sub:    #854F0B;

    --black-fill:   #F1EFE8;
    --black-stroke: #5F5E5A;
    --black-title:  #2C2C2A;
    --black-sub:    #5F5E5A;

    --arrow-color: #444444;
    --res-bypass:  #999999;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg:       #1e1e1e;
      --fg:       #e8e6de;
      --fg2:      #a0a09a;
      --border:   #444440;
      --dash:     #555550;

      --teal-fill:   #085041;
      --teal-stroke: #5DCAA5;
      --teal-title:  #9FE1CB;
      --teal-sub:    #5DCAA5;

      --purple-fill:   #3C3489;
      --purple-stroke: #AFA9EC;
      --purple-title:  #CECBF6;
      --purple-sub:    #AFA9EC;

      --blue-fill:   #0C447C;
      --blue-stroke: #85B7EB;
      --blue-title:  #B5D4F4;
      --blue-sub:    #85B7EB;

      --coral-fill:   #712B13;
      --coral-stroke: #F0997B;
      --coral-title:  #F5C4B3;
      --coral-sub:    #F0997B;

      --amber-fill:   #633806;
      --amber-stroke: #EF9F27;
      --amber-title:  #FAC775;
      --amber-sub:    #EF9F27;

      --black-fill:   #444441;
      --black-stroke: #B4B2A9;
      --black-title:  #D3D1C7;
      --black-sub:    #B4B2A9;

      --arrow-color: #bbbbbb;
      --res-bypass:  #666666;
    }
  }

  body {
    background: var(--bg);
    margin: 0;
    padding: 16px;
    font-family: system-ui, -apple-system, sans-serif;
  }

  svg { display: block; width: 100%; max-width: 720px; margin: 0 auto; }

  .fg       { fill: var(--fg); }
  .fg2      { fill: var(--fg2); }
  .arrow-ln { stroke: var(--arrow-color); }

  .box-teal   { fill: var(--teal-fill);   stroke: var(--teal-stroke); }
  .box-purple { fill: var(--purple-fill); stroke: var(--purple-stroke); }
  .box-blue   { fill: var(--blue-fill);   stroke: var(--blue-stroke); }
  .box-coral  { fill: var(--coral-fill);  stroke: var(--coral-stroke); }
  .box-amber  { fill: var(--amber-fill);  stroke: var(--amber-stroke); }
  .box-black   { fill: var(--black-fill);   stroke: var(--black-stroke); }

  .txt-teal-h   { fill: var(--teal-title); }
  .txt-teal-s   { fill: var(--teal-sub); }
  .txt-purple-h { fill: var(--purple-title); }
  .txt-purple-s { fill: var(--purple-sub); }
  .txt-blue-h   { fill: var(--blue-title); }
  .txt-blue-s   { fill: var(--blue-sub); }
  .txt-coral-h  { fill: var(--coral-title); }
  .txt-coral-s  { fill: var(--coral-sub); }
  .txt-amber-h  { fill: var(--amber-title); }
  .txt-amber-s  { fill: var(--amber-sub); }
  .txt-black-h   { fill: var(--black-title); }
  .txt-black-s   { fill: var(--black-sub); }

  .container-border { fill: none; stroke: var(--dash); }
  .bypass { fill: none; stroke: var(--res-bypass); }

  text { font-family: system-ui, -apple-system, sans-serif; }
  .th  { font-size: 13px; font-weight: 600; }
  .ts  { font-size: 11px; font-weight: 400; }
</style>
</head>
<body>
<svg viewBox="0 0 680 1340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>PicoGPT tensor flow diagram</title>
  <desc>End-to-end tensor shape diagram for PicoGPT: token input, embeddings, N transformer blocks each with multi-head attention and feedforward, final LayerNorm, and projection to logits.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="arrow-ln"/>
    </marker>
  </defs>

  <!-- ── INPUT ───────────────────────────────────────────── -->
  <rect x="230" y="20" width="220" height="44" rx="8" stroke-width="0.8" class="box-black"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" class="th txt-black-h">Input tokens</text>
  <text x="340" y="74" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T]   integers ∈ [0, vocab_size)</text>

  <line x1="340" y1="78" x2="340" y2="100" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- ── EMBEDDING ───────────────────────────────────────── -->
  <rect x="140" y="100" width="400" height="68" rx="8" stroke-width="0.8" class="box-teal"/>
  <text x="340" y="124" text-anchor="middle" dominant-baseline="central" class="th txt-teal-h">Token emb + Positional emb</text>
  <text x="340" y="148" text-anchor="middle" dominant-baseline="central" class="ts txt-teal-s">Embedding(vocab_size, E) + Embedding(context_len, E)</text>
  <text x="340" y="182" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T, E]</text>

  <line x1="340" y1="186" x2="340" y2="208" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- ── BLOCK DASHED CONTAINER ─────────────────────────── -->
  <rect x="40" y="208" width="600" height="820" rx="14" stroke-width="1.2" stroke-dasharray="6 4" class="container-border"/>
  <text x="56" y="226" dominant-baseline="central" class="ts fg2">Block × N  (residual stream [B, T, E] throughout)</text>

  <!-- ── LN1 ─────────────────────────────────────────────── -->
  <rect x="210" y="238" width="260" height="44" rx="8" stroke-width="0.8" class="box-purple"/>
  <text x="340" y="260" text-anchor="middle" dominant-baseline="central" class="th txt-purple-h">LayerNorm 1</text>
  <text x="340" y="293" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T, E]</text>

  <line x1="340" y1="297" x2="340" y2="318" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- ── MHA DASHED CONTAINER ──────────────────────────── -->
  <rect x="80" y="318" width="520" height="302" rx="10" stroke-width="0.8" stroke-dasharray="4 3" class="container-border"/>
  <text x="97" y="336" dominant-baseline="central" class="ts fg2">MultiHeadAttention</text>

  <!-- Head 1 -->
  <rect x="96" y="346" width="148" height="116" rx="8" stroke-width="0.8" class="box-blue"/>
  <text x="170" y="370" text-anchor="middle" dominant-baseline="central" class="th txt-blue-h">Head 1</text>
  <text x="170" y="389" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">Q, K, V  Linear</text>
  <text x="170" y="405" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">[B,T,E] → [B,T,H]</text>
  <text x="170" y="421" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">QKᵀ/√H · mask</text>
  <text x="170" y="437" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">softmax → V</text>
  <text x="170" y="453" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">out [B,T,H]</text>

  <!-- Head 2 -->
  <rect x="266" y="346" width="148" height="116" rx="8" stroke-width="0.8" class="box-blue"/>
  <text x="340" y="370" text-anchor="middle" dominant-baseline="central" class="th txt-blue-h">Head 2</text>
  <text x="340" y="389" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">Q, K, V  Linear</text>
  <text x="340" y="405" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">[B,T,E] → [B,T,H]</text>
  <text x="340" y="421" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">QKᵀ/√H · mask</text>
  <text x="340" y="437" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">softmax → V</text>
  <text x="340" y="453" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">out [B,T,H]</text>

  <!-- ellipsis -->
  <text x="436" y="404" text-anchor="middle" dominant-baseline="central" class="th fg2">…</text>

  <!-- Head n -->
  <rect x="456" y="346" width="126" height="116" rx="8" stroke-width="0.8" class="box-blue"/>
  <text x="519" y="370" text-anchor="middle" dominant-baseline="central" class="th txt-blue-h">Head n</text>
  <text x="519" y="389" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">Q, K, V  Linear</text>
  <text x="519" y="405" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">[B,T,E]→[B,T,H]</text>
  <text x="519" y="421" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">QKᵀ/√H · mask</text>
  <text x="519" y="437" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">softmax → V</text>
  <text x="519" y="453" text-anchor="middle" dominant-baseline="central" class="ts txt-blue-s">out [B,T,H]</text>

  <!-- attention note -->
  <text x="340" y="476" text-anchor="middle" dominant-baseline="central" class="ts fg2">att matrix [B,T,T] — causal tril mask + dropout(0.2)</text>

  <!-- concat arrow -->
  <line x1="340" y1="490" x2="340" y2="508" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- concat box -->
  <rect x="185" y="508" width="310" height="44" rx="8" stroke-width="0.8" class="box-black"/>
  <text x="340" y="524" text-anchor="middle" dominant-baseline="central" class="th txt-black-h">cat(heads, dim=-1) + Dropout(0.2)</text>
  <text x="340" y="546" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T, n·H] = [B, T, E]</text>

  <!-- out of MHA -->
  <line x1="340" y1="550" x2="340" y2="572" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- residual bypass 1 -->
  <path d="M 80 293 L 66 293 L 66 584 L 270 584" stroke-width="1" stroke-dasharray="4 3" class="bypass"/>

  <!-- Residual add 1 -->
  <rect x="270" y="572" width="140" height="36" rx="8" stroke-width="0.8" class="box-black"/>
  <text x="340" y="590" text-anchor="middle" dominant-baseline="central" class="th txt-black-h">x = x + attn(ln1(x))</text>
  <text x="340" y="620" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T, E]</text>

  <line x1="340" y1="624" x2="340" y2="644" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- ── LN2 ─────────────────────────────────────────────── -->
  <rect x="210" y="644" width="260" height="44" rx="8" stroke-width="0.8" class="box-purple"/>
  <text x="340" y="666" text-anchor="middle" dominant-baseline="central" class="th txt-purple-h">LayerNorm 2</text>
  <text x="340" y="699" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T, E]</text>

  <line x1="340" y1="703" x2="340" y2="722" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- ── FF CONTAINER ───────────────────────────────────── -->
  <rect x="120" y="722" width="440" height="166" rx="10" stroke-width="0.8" stroke-dasharray="4 3" class="container-border"/>
  <text x="136" y="740" dominant-baseline="central" class="ts fg2">FeedForward</text>

  <rect x="140" y="748" width="180" height="44" rx="8" stroke-width="0.8" class="box-coral"/>
  <text x="230" y="764" text-anchor="middle" dominant-baseline="central" class="th txt-coral-h">Linear + ReLU</text>
  <text x="230" y="782" text-anchor="middle" dominant-baseline="central" class="ts txt-coral-s">[B,T,E] → [B,T,4E]</text>
  <text x="230" y="806" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B,T,4E]</text>

  <line x1="320" y1="770" x2="360" y2="770" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <rect x="360" y="748" width="180" height="44" rx="8" stroke-width="0.8" class="box-coral"/>
  <text x="450" y="764" text-anchor="middle" dominant-baseline="central" class="th txt-coral-h">Linear + ReLU</text>
  <text x="450" y="782" text-anchor="middle" dominant-baseline="central" class="ts txt-coral-s">[B,T,4E] → [B,T,E]</text>
  <text x="450" y="806" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B,T,E]</text>

  <line x1="340" y1="794" x2="340" y2="840" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- residual bypass 2 -->
  <path d="M 120 699 L 106 699 L 106 854 L 270 854" stroke-width="1" stroke-dasharray="4 3" class="bypass"/>

  <!-- Residual add 2 -->
  <rect x="270" y="842" width="140" height="36" rx="8" stroke-width="0.8" class="box-black"/>
  <text x="340" y="860" text-anchor="middle" dominant-baseline="central" class="th txt-black-h">x = x + ff(ln2(x))</text>
  <text x="340" y="888" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T, E]</text>

  <!-- ── BLOCK REPEAT ARROW (right side) ───────────────── -->
  <path d="M 640 888 L 652 888 L 652 208 L 640 208" stroke-width="1.2" stroke-dasharray="5 3" class="bypass" marker-end="url(#arr)"/>
  <text x="662" y="548" text-anchor="middle" dominant-baseline="central" transform="rotate(90,662,548)" class="ts fg2">× N blocks</text>

  <!-- connector down to final LN -->
  <line x1="340" y1="892" x2="340" y2="1016" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>
  <text x="356" y="958" dominant-baseline="central" class="ts fg2">[B, T, E]</text>

  <!-- ── FINAL LAYERNORM ────────────────────────────────── -->
  <rect x="210" y="1016" width="260" height="44" rx="8" stroke-width="0.8" class="box-purple"/>
  <text x="340" y="1038" text-anchor="middle" dominant-baseline="central" class="th txt-purple-h">LayerNorm (final)</text>
  <text x="340" y="1072" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T, E]</text>

  <line x1="340" y1="1076" x2="340" y2="1096" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- ── PROJECTION ─────────────────────────────────────── -->
  <rect x="175" y="1096" width="330" height="56" rx="8" stroke-width="0.8" class="box-amber"/>
  <text x="340" y="1116" text-anchor="middle" dominant-baseline="central" class="th txt-amber-h">Linear projection</text>
  <text x="340" y="1138" text-anchor="middle" dominant-baseline="central" class="ts txt-amber-s">Linear(E, vocab_size, bias=False)</text>
  <text x="340" y="1165" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T, E] → [B, T, vocab_size]</text>

  <line x1="340" y1="1169" x2="340" y2="1189" stroke-width="1.2" marker-end="url(#arr)" class="arrow-ln"/>

  <!-- ── OUTPUT ─────────────────────────────────────────── -->
  <rect x="230" y="1189" width="220" height="44" rx="8" stroke-width="0.8" class="box-black"/>
  <text x="340" y="1211" text-anchor="middle" dominant-baseline="central" class="th txt-black-h">Logits</text>
  <text x="340" y="1245" text-anchor="middle" dominant-baseline="central" class="ts fg2">[B, T, vocab_size]</text>

  <!-- ── LEGEND ─────────────────────────────────────────── -->
  <rect x="40" y="1265" width="600" height="56" rx="6" stroke-width="0.5" class="container-border"/>
  <text x="56" y="1282" dominant-baseline="central" class="ts fg2">B = batch   T = context_len   E = embedding_len   H = head_size = E / n_heads   n = num_heads</text>

  <rect x="56"  y="1295" width="10" height="10" rx="2" class="box-teal"/>
  <text x="72"  y="1304" dominant-baseline="central" class="ts fg2">Embedding</text>
  <rect x="156" y="1295" width="10" height="10" rx="2" class="box-purple"/>
  <text x="172" y="1304" dominant-baseline="central" class="ts fg2">LayerNorm</text>
  <rect x="258" y="1295" width="10" height="10" rx="2" class="box-blue"/>
  <text x="274" y="1304" dominant-baseline="central" class="ts fg2">Attn head</text>
  <rect x="350" y="1295" width="10" height="10" rx="2" class="box-coral"/>
  <text x="366" y="1304" dominant-baseline="central" class="ts fg2">FeedForward</text>
  <rect x="454" y="1295" width="10" height="10" rx="2" class="box-amber"/>
  <text x="470" y="1304" dominant-baseline="central" class="ts fg2">Projection</text>
</svg>
</body>
</html>
